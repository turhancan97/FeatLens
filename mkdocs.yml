site_name: FeatLens
site_description: Model-agnostic feature-map visualization — PCA-to-RGB feature maps from any vision model and any layer.
site_url: https://turhancan97.github.io/FeatLens/
repo_url: https://github.com/turhancan97/FeatLens
repo_name: turhancan97/FeatLens
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true
            docstring_section_style: table

extra:
  analytics:
    provider: google
    property: G-TFXSWFNDXJ

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Visualization methods: methods.md
  - Model sources: models.md
  - API Reference: api.md
  - Contributing: contributing.md
